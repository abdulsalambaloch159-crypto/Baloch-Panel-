<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALOCH HACKER PANEL</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: radial-gradient(circle, #220000 0%, #050505 100%);
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .panel {
            width: 320px;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #ff0000;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px #ff0000;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 5px;
            letter-spacing: 5px;
        }
        .version {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 15px #ff0000;
            cursor: pointer;
        }
        .status-bar {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #00ff00;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>BALOCH</h1>
        <div class="version">V1.0 PREMIUM PANEL</div>
        
        <a href="#" class="btn">Auto Headshot [OFF]</a>
        <a href="#" class="btn">Aim Bot [OFF]</a>
        <a href="#" class="btn">Antiban Bypass</a>
        <a href="#" class="btn">Contact Dev</a>

        <div class="status-bar">● System: Protected & Active</div>
    </div>
</body>
</html>
